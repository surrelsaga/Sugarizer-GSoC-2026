<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8" />
<title>Connect The Dots</title>
<meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, viewport-fit=cover"/>
<link rel="stylesheet" media="not screen and (device-width: 1200px) and (device-height: 900px)"
	href="lib/sugar-web/graphics/css/sugar-96dpi.css">
<link rel="stylesheet" media="screen and (device-width: 1200px) and (device-height: 900px)"
	href="lib/sugar-web/graphics/css/sugar-200dpi.css">
<link rel="stylesheet" href="css/activity.css">
<script data-main="js/loader" src="lib/require.js"></script>
<script type="text/javascript" src="../../cordova.js"></script>
</head>

<body>
<div id="main-toolbar" class="toolbar">
  <button class="toolbutton" id="activity-button" title="My Activity"></button>

  <button class="toolbutton" id="drawMode-button" title="Draw Mode"></button>
  <button class="toolbutton" id="numberMode-button" title="Number Mode"></button>
  <button class="toolbutton" id="gameMode-button" title="Game Mode"></button>
  <button class="toolbutton" id="undo-button" title="Undo"></button>
  <button class="toolbutton" id="redo-button" title="Redo"></button>
  <button class="toolbutton" id="clear-button" title="Clear"></button>
  <button class="toolbutton" id="changeColor-button" title="Change Color"></button>
  <button class="toolbutton" id="changeShape-button" title="Change Shape"></button>
  <button class="toolbutton" id="network-button" title="Network"></button>

  <button class="toolbutton pull-right" id="stop-button" title="Stop"></button>
</div>

<div id="canvas">
  <div id="grid-container"></div>

  <!-- Add the virtual canvas below and we'll draw straight lines connecting the dots on this canvas not our container
   we lay this canva on top of the container but we'll ignore the mouse event on this canvas  -->
   <!-- This needs to have svg tag cause without this, we don't have namespace to draw polygons or lines -->
  <svg id="line-canvas"></svg>
</div>
</body>

</html>
